<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", sans-serif;
            height: 100vh;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.42) 2px, transparent 2px) 0 0 / 68px 68px,
                linear-gradient(rgba(37, 99, 235, 0.42) 2px, transparent 2px) 0 0 / 68px 40px,
                #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.94);
            border: 2px solid #2563eb;
            border-radius: 8px;
            box-shadow: 0 14px 36px rgba(37, 99, 235, 0.16);
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        h2 {
            color: #123a7a;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            border-radius: 6px;
            border: 1px solid #7fb3ff;
            border-bottom: 3px solid #2563eb;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #ffffff;
        }

        input:focus, select:focus {
            border-color: #1d4ed8;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background: #1d4ed8;
            box-shadow: 0 6px 15px rgba(37, 99, 235, 0.28);
        }

        .home-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: auto;
            min-height: 40px;
            padding: 0 14px;
            color: #1d4ed8;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(37, 99, 235, 0.35);
            border-radius: 8px;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.18);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .home-link:hover {
            background: #ffffff;
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <a href="/" class="home-link">← Trang chủ</a>

    <div class="card">
        <h2>🎮 Vào Trận!</h2>
        <form action="/start_game" method="POST">
            <input type="text" name="nickname" placeholder="Nhập nickname..." required>
            <select name="bai" required>
                <option value="" disabled selected>-- Chọn bài thi --</option>
                <option value="bai_1">📝 Bài 1: Toán lớp 7</option>
                <option value="bai_2">📜 Bài 2: Hoạt động trải nghiệm</option>
            </select>
            <button type="submit"> Bắt đầu</button>
        </form>
    </div>
</body>
</html>
