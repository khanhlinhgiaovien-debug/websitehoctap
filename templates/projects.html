<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách đề bài sản phẩm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                linear-gradient(90deg, rgba(37, 99, 235, 0.42) 2px, transparent 2px) 0 0 / 68px 68px,
                linear-gradient(rgba(37, 99, 235, 0.42) 2px, transparent 2px) 0 0 / 68px 40px,
                #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #2563eb;
            border-radius: 8px;
            box-shadow: 0 18px 44px rgba(37, 99, 235, 0.16);
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #123a7a;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: none;
        }

        .projects-list {
            list-style: none;
        }

        .project-item {
            background: #ffffff;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(37, 99, 235, 0.25);
            border-left: 5px solid #2563eb;
        }

        .project-item:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.22);
            border-left-color: #1d4ed8;
        }

        .project-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-title {
            color: #2d3748;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        .project-item:hover .project-title {
            color: #1d4ed8;
        }

        .project-description {
            color: #4a5568;
            font-size: 1.1em;
            line-height: 1.6;
            font-style: italic;
        }

        .back-button {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.28);
        }

        .back-button:hover {
            transform: translateY(-3px);
            background: #1d4ed8;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.34);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }

            h2 {
                font-size: 2em;
            }

            .project-item {
                padding: 20px;
            }

            .project-title {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📚 Danh sách đề bài sản phẩm</h2>
        
        {% if projects %}
        <ul class="projects-list">
            {% for project in projects %}
            <li class="project-item">
                <a href="{{ url_for('project', project_id=project.id) }}" class="project-link">
                    <div class="project-title">{{ project.title }}</div>
                    <div class="project-description">{{ project.description }}</div>
                </a>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p style="font-size: 1.3em;">Chưa có đề bài nào</p>
        </div>
        {% endif %}
        
        <a href="/" class="back-button">⬅️ Quay về trang chính</a>
    </div>
</body>
</html>
