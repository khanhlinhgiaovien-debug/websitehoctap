<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f3f6fb;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .login-panel {
            width: min(420px, calc(100vw - 32px));
            background: #fff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 28px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
        }
        .login-title {
            font-weight: 800;
            color: #123a7a;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <h1 class="h3 login-title">Admin</h1>
        <p class="text-muted mb-4">Quản lý tài khoản giáo viên</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label class="form-label" for="username">Tên đăng nhập</label>
                <input class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Mật khẩu</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Đăng nhập</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('exam_student_login') }}">Học sinh</a>
            <span class="text-muted mx-2">|</span>
            <a href="{{ url_for('exam_parent_login') }}">Phụ huynh</a>
            <span class="text-muted mx-2">|</span>
            <a href="{{ url_for('exam_teacher_login') }}">Giáo viên</a>
        </div>
    </main>
</body>
</html>
